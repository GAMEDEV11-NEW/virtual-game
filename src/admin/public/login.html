<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="login">
  <div class="wrap narrow">
    <h1>Admin Login</h1>
    <div class="sub">Sign in to access dashboard, live, and history pages</div>

    <div class="card auth-card">
      <div class="k">Login</div>
      <div class="auth-row">
        <input id="loginUser" type="text" placeholder="Username" autocomplete="username" />
        <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
        <button id="loginBtn" type="button">Sign In</button>
      </div>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
