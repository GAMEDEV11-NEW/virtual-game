<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Matches</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="live">
  <div class="wrap">
    <div class="header-row">
      <div>
        <h1>Live Matches</h1>
        <div class="sub">Current active matches from Redis</div>
      </div>
      <div class="header-actions">
        <button id="autoRefreshToggle" type="button">Auto Refresh: ON</button>
        <button id="logoutBtn" class="danger" type="button">Logout</button>
      </div>
    </div>

    <nav class="nav-links mt">
      <a href="/dashboard">Dashboard</a>
      <a class="active" href="/live">Live</a>
      <a href="/history">History</a>
      <a id="usersNavLink" href="/users" style="display:none">Users</a>
    </nav>

    <div class="mt card toolbar">
      <div class="tab-buttons">
        <button id="liveKindMatch" class="tab-btn active" type="button">Match</button>
        <button id="liveKindContestJoin" class="tab-btn" type="button">Contest Join</button>
      </div>
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search game/user/status..." />
        <select id="pageSizeSelect">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <div class="mt table-responsive">
      <table id="liveTable">
        <thead id="liveTableHead"></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="mt pager">
      <button id="prevBtn" type="button">Prev</button>
      <span id="pageInfo" class="mono"></span>
      <button id="nextBtn" type="button">Next</button>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
