<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Match History</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="history">
  <div class="wrap">
    <div class="header-row">
      <div>
        <h1>Historic Data</h1>
        <div class="sub">Completed, expired, and cancelled matches</div>
      </div>
      <button id="logoutBtn" class="danger" type="button">Logout</button>
    </div>

    <nav class="nav-links mt">
      <a href="/dashboard">Dashboard</a>
      <a href="/live">Live</a>
      <a class="active" href="/history">History</a>
      <a id="usersNavLink" href="/users" style="display:none">Users</a>
    </nav>

    <div class="mt card toolbar">
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search match/user/contest..." />
        <select id="pageSizeSelect">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <div class="mt table-responsive">
      <div class="k title-gap">Status Counts</div>
      <table id="historicStatusTable">
        <thead>
          <tr><th>Status</th><th>Count</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="mt history-layout">
      <div class="history-main table-responsive">
        <table id="historicTable">
          <thead>
            <tr>
              <th>Match</th>
              <th>LID</th>
              <th>Opp LID</th>
              <th>User</th>
              <th>Opp User</th>
              <th>Contest</th>
              <th>Status</th>
              <th>Contest Type</th>
              <th>Turn</th>
              <th>Winner</th>
              <th>Server</th>
              <th>Last Move</th>
              <th>Lock</th>
              <th>Joined</th>
              <th>Started</th>
              <th>Ended</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <aside class="card history-preview">
        <div class="k">Preview</div>
        <pre id="historyPreview" class="mono">Click "View" to preview full record.</pre>
      </aside>
    </div>

    <div class="mt pager">
      <button id="prevBtn" type="button">Prev</button>
      <span id="pageInfo" class="mono"></span>
      <button id="nextBtn" type="button">Next</button>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
