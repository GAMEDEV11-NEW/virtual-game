<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="dashboard">
  <div class="wrap">
    <div class="header-row">
      <div>
        <h1>Dashboard</h1>
        <div class="sub">System overview</div>
      </div>
      <div class="header-actions">
        <button id="autoRefreshToggle" type="button">Auto Refresh: ON</button>
        <button id="logoutBtn" class="danger" type="button">Logout</button>
      </div>
    </div>

    <nav class="nav-links mt">
      <a class="active" href="/dashboard">Dashboard</a>
      <a href="/live">Live</a>
      <a href="/history">History</a>
      <a id="usersNavLink" href="/users" style="display:none">Users</a>
    </nav>

    <div class="mt card">
      <div class="k">Service State</div>
      <pre id="service" class="mono"></pre>
    </div>

    <div class="mt">
      <div class="k title-gap">Live Redis Metrics</div>
      <div id="liveCards" class="grid"></div>
    </div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
